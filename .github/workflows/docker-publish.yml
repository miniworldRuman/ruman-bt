name: Docker Build & Push to Aliyun ACR

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  # ===== 可自定义变量（非敏感）=====
  ALI_REGISTRY: ${{ vars.ALI_REGISTRY }}        # 例如：registry.cn-hangzhou.aliyuncs.com
  ALI_NAMESPACE: ${{ vars.ALI_NAMESPACE }}      # 命名空间
  IMAGE_NAME: ${{ vars.IMAGE_NAME }}            # 镜像仓库名
  IMAGE_TAG: ${{ vars.IMAGE_TAG || 'latest' }}  # 镜像标签（默认 latest）

jobs:
  build-and-push:
    runs-on: ubuntu

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Aliyun Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ALI_REGISTRY }}
          username: ${{ secrets.ALI_DOCKER_USERNAME }}
          password: ${{ secrets.ALI_DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.ALI_REGISTRY }}/${{ env.ALI_NAMESPACE }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
